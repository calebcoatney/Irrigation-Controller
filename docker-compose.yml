services:
  backend:
    build: ./backend
    container_name: irrigation-backend
    devices:
      - /dev/irrigation_relay:/dev/irrigation_relay
    volumes:
      - type: bind
        source: /srv/irrigation-controller/data
        target: /data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: irrigation-frontend
    ports:
      - "127.0.0.1:80:80"
    depends_on:
      - backend
    restart: unless-stopped
